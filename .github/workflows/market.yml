name: Market Index Updater

on:
  schedule:
    # Refresh market cards during regular North American market hours.
    # UTC window covers both standard and daylight time for Eastern markets.
    - cron: '*/30 14-22 * * 1-5'
  workflow_dispatch:

concurrency:
  group: market-scraper
  cancel-in-progress: false

jobs:
  market:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas

      - name: Run market scraper
        run: python market_scraper.py

      - name: Commit and push if changed
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add market_data.json
          git diff --staged --quiet || git commit -m "Update market data for $(date +'%Y-%m-%d %H:%M UTC')"
          git push
